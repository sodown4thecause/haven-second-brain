# Visit https://soloterm.com to learn more
name: second brain
icon: null
processes:
  npm:test:
    command: npm run test
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Run:
    command: cargo run
    working_dir: null
    auto_start: true
    auto_restart: true
    restart_when_changed: []
    env: {}
  npm:dev:
    command: npm run dev
    working_dir: null
    auto_start: true
    auto_restart: false
    restart_when_changed: []
    env: {}
  Watch:
    command: cargo watch -x run
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  npm:build:
    command: npm run build
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
