<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haven</title>
  <style>
    body { margin: 0; font-family: ui-sans-serif, system-ui, sans-serif; color: #171717; background: #faf7f0; }
    button, input, textarea { font: inherit; }
    button { border: 1px solid #1f2937; border-radius: 999px; background: #1f2937; color: white; padding: 0.55rem 1rem; cursor: pointer; }
    input, textarea { box-sizing: border-box; width: 100%; border: 1px solid #d6d3d1; border-radius: 0.75rem; padding: 0.65rem 0.75rem; background: white; }
    textarea { resize: vertical; line-height: 1.5; }
    label { display: grid; gap: 0.35rem; font-weight: 650; }
    #app { min-height: 100vh; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; padding: 1rem clamp(1rem, 4vw, 2rem); border-bottom: 1px solid #e7e5e4; background: rgba(255, 255, 255, 0.72); backdrop-filter: blur(10px); }
    .topbar h1 { margin: 0; font-size: 1.35rem; }
    .topbar p { margin: 0.2rem 0 0; color: #57534e; }
    .shell { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(18rem, 0.6fr); gap: 1rem; padding: clamp(1rem, 4vw, 2rem); }
    .pane { display: grid; align-content: start; gap: 1rem; border: 1px solid #e7e5e4; border-radius: 1.25rem; padding: 1rem; background: rgba(255, 255, 255, 0.86); box-shadow: 0 18px 60px rgba(68, 64, 60, 0.08); }
    .actions { display: flex; gap: 0.65rem; flex-wrap: wrap; }
    #status { margin: 0; color: #57534e; }
    #results { margin: 0; padding-left: 1.25rem; }
    #results li { margin-bottom: 0.85rem; }
    #results p { margin: 0.25rem 0 0; color: #57534e; }
    @media (max-width: 760px) { .topbar, .shell { grid-template-columns: 1fr; } .topbar { align-items: stretch; flex-direction: column; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
